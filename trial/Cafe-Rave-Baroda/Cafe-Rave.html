<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe to Rave // An Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&family=Righteous&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.9.3/tsparticles.bundle.min.js"></script>

    <style>
        :root {
            --dark-purple: #10002b;
            --main-purple: #240046;
            --neon-pink: #ff00f4;
            --neon-cyan: #00f5d4;
            --text-primary: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.2);
            
            /* State-specific variables */
            --bg-color: #f4f4f4;
            --text-color: #333;
            --title-font: 'Poppins', sans-serif;
            --title-weight: 300;
        }

        /* RAVE STATE STYLES */
        body.rave-mode {
            --bg-color: var(--dark-purple);
            --text-color: var(--text-primary);
            --title-font: 'Righteous', cursive;
            --title-weight: 400;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Important for full-screen experience */
            transition: background-color 1s ease;
        }
        
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s ease;
        }

        body.rave-mode #particles-js {
            opacity: 1;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        
        /* --- TRIGGER STATE --- */
        .trigger-container {
            text-align: center;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        body.rave-mode .trigger-container {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .coffee-cup {
            font-size: 5rem;
            animation: steam 4s linear infinite;
        }

        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 0.8; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .trigger-text {
            font-size: 1.5rem;
            margin-top: 1rem;
            font-weight: 300;
        }


        /* --- RAVE STATE CONTENT --- */
        .rave-content {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            pointer-events: none;
            overflow-y: auto;
            padding-top: 10vh; /* space for title */
        }
        
        body.rave-mode .rave-content {
            opacity: 1;
            pointer-events: all;
        }

        .hero-title {
            font-family: var(--title-font);
            font-weight: var(--title-weight);
            font-size: clamp(3rem, 10vw, 7rem);
            transition: all 1s ease;
            text-align: center;
            margin-bottom: 2rem;
            padding: 0 20px;
        }

        body.rave-mode .hero-title {
            animation: rave-title-flicker 4s linear infinite;
        }

        @keyframes rave-title-flicker {
            0%, 19%, 21%, 59%, 61%, 100% {
                text-shadow: 0 0 5px var(--neon-cyan), 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-pink), 0 0 60px var(--neon-pink);
            }
            20%, 60% {
                text-shadow: none;
            }
        }
        
        .details-grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 20px 100px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            perspective: 1500px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.6s ease;
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2), transparent, transparent);
            border-radius: 50%;
            top: var(--mouse-y, -100px);
            left: var(--mouse-x, -100px);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover::before { opacity: 1; }
        .card-content-wrapper { transform: translateZ(20px); }
        .card-icon { font-size: 2.5rem; color: var(--neon-cyan); }
        .card-title { font-size: 1.25rem; font-weight: 600; }

        /* --- Cursor Trail --- */
        .cursor-trail {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--neon-pink);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            opacity: 0;
        }
    </style>
</head>
<body>
    
    <div id="particles-js"></div>
    
    <div class="container">
        
        <div class="trigger-container" id="trigger">
            <div class="coffee-cup">☕</div>
            <div class="trigger-text">Stir the chaos</div>
        </div>
        
        <div class="rave-content">
            <h1 class="hero-title">CAFE RAVE</h1>
            
            <div class="details-grid">
                <div class="glass-card"><div class="card-content-wrapper"><div class="card-icon">📅</div><h3 class="card-title">WHEN</h3><p>Sat, Aug 15</p></div></div>
                <div class="glass-card"><div class="card-content-wrapper"><div class="card-icon">📍</div><h3 class="card-title">WHERE</h3><p>Downtown, Vadodara</p></div></div>
                <div class="glass-card"><div class="card-content-wrapper"><div class="card-icon">🎵</div><h3 class="card-title">SOUND</h3><p>House / Techno</p></div></div>
                <div class="glass-card"><div class="card-content-wrapper"><div class="card-icon">🍸</div><h3 class="card-title">MENU</h3><p>Coffee & Cocktails</p></div></div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        const trigger = document.getElementById('trigger');
        const body = document.body;

        // --- AUDIO ENGINE ---
        // Using free assets for demonstration
        const cafeSound = new Audio('https://cdn.pixabay.com/audio/2022/05/27/audio_29845882d9.mp3');
        cafeSound.loop = true;
        const raveSound = new Audio('https://cdn.pixabay.com/audio/2024/05/13/audio_88c5c36f8c.mp3');
        raveSound.loop = true;

        // --- STATE MANAGEMENT ---
        let isRaving = false;

        trigger.addEventListener('click', () => {
            if (isRaving) return;
            isRaving = true;

            // 1. Switch Audio
            cafeSound.pause();
            raveSound.play();

            // 2. Add 'rave-mode' class to body to trigger CSS transitions
            body.classList.add('rave-mode');
            
            // 3. Initialize Particles
            tsParticles.load("particles-js", {
                fpsLimit: 60,
                particles: {
                    number: { value: 100, density: { enable: true, value_area: 800 } },
                    color: { value: ["#00f5d4", "#ff00f4", "#ffffff"] },
                    shape: { type: "circle" },
                    opacity: { value: 0.8, random: true },
                    size: { value: 3, random: { enable: true, minimumValue: 1 } },
                    links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
                    move: { enable: true, speed: 4, direction: "none", out_mode: "out" },
                },
                interactivity: { events: { onHover: { enable: true, mode: "grab" } }, modes: { grab: { distance: 140, links: { opacity: 1 } } } },
            });
            
            // 4. Activate Cursor Trail & 3D Cards
            initRaveInteractivity();
        });
        
        // Start calm cafe sounds quietly on first interaction
        document.body.addEventListener('mousemove', () => {
            if (!isRaving && cafeSound.paused) {
                cafeSound.volume = 0.3;
                cafeSound.play();
            }
        }, { once: true });


        function initRaveInteractivity() {
            // --- 3D INTERACTIVE CARD LOGIC ---
            const cards = document.querySelectorAll(".glass-card");
            cards.forEach(card => {
                card.addEventListener("mousemove", (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    const rotateX = (y / rect.height) * -25;
                    const rotateY = (x / rect.width) * 25;
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                    card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                    card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
                });
                card.addEventListener("mouseleave", () => {
                    card.style.transform = `rotateX(0deg) rotateY(0deg)`;
                });
            });

            // --- CURSOR TRAIL LOGIC ---
            const trailCount = 10;
            const trailElements = [];
            for (let i = 0; i < trailCount; i++) {
                const el = document.createElement('div');
                el.classList.add('cursor-trail');
                body.appendChild(el);
                trailElements.push(el);
            }

            window.addEventListener('mousemove', (e) => {
                trailElements.forEach((el, i) => {
                    setTimeout(() => {
                        el.style.left = `${e.clientX}px`;
                        el.style.top = `${e.clientY}px`;
                        el.style.opacity = (trailCount - i) / trailCount;
                        el.style.transition = `opacity 0.5s, transform ${0.1 + i * 0.02}s`;
                        el.style.transform = `translate(-50%, -50%) scale(${(trailCount - i) / trailCount})`;
                    }, i * 20);
                });
            });
        }
    });
    </script>
</body>
</html>
